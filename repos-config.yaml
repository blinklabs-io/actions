# Shared branch-protection defaults — referenced via YAML merge key below.
branch_protection_defaults: &branch_protection_defaults
  required_status_checks: []
  require_up_to_date: false
  bypass_pull_request: false
  bypass_actors_users: []
  bypass_actors_teams: []
  bypass_actors_apps:
    - blinklabs-governance
  required_approving_review_count: 1
  dismiss_stale_reviews: true
  require_code_owner_reviews: false
  enforce_admins: false
  require_linear_history: false
  required_conversation_resolution: false
  allow_force_pushes: false
  allow_deletions: false
  lock_branch: false

# Optional org-wide auto-discovery. Disabled by default: when absent or
# `enabled: false`, the engine manages exactly the repositories listed under
# `repositories:` below. When enabled, the engine additionally lists the
# organization's repositories and manages any that carry a profile marker at
# `marker_path` (default `.blinklabs/profile.yml`). Explicit `repositories:`
# entries always take precedence over discovered ones.
#
# NOTE: enabling discovery requires the sync workflow to mint an org-scoped
# GitHub App token (see .github/workflows/sync.yaml); it also enables the
# scheduled reconciliation run so newly-created marker repos are picked up.
#
# discovery:
#   enabled: true
#   organization: blinklabs-io
#   topic: blinklabs-managed          # optional: only repos with this topic
#   marker_path: .blinklabs/profile.yml  # optional (this is the default)

profiles:
  # docker-standard: the shared shape for every simple Docker wrapper repo.
  # A repo using this profile only supplies `vars` (image + description) and,
  # for genuinely special cases, `overrides`.
  docker-standard:
    settings:
      delete_branch_on_merge: true
    collaborators: []
    branch_protection:
      - branch: main
        <<: *branch_protection_defaults
    workflows:
      - destination_file: conventional-commits.yml
        workflow_name: "Conventional Commits"
        reusable_workflow: "blinklabs-io/actions/.github/workflows/reuseable-conventional-commits.yml@main"
        triggers:
          pull_request:

      - destination_file: ci-docker.yml
        workflow_name: "Docker CI"
        reusable_workflow: "blinklabs-io/actions/.github/workflows/reuseable-ci-docker-multiarch.yml@main"
        triggers:
          pull_request:
            branches: [main]
            paths:
              - Dockerfile
              - .github/workflows/ci-docker.yml
        params:
          image-name: "blinklabs-io/${image}"

      - destination_file: publish.yml
        workflow_name: "publish"
        reusable_workflow: "blinklabs-io/actions/.github/workflows/reuseable-publish-docker-multiarch.yml@main"
        triggers:
          push:
            branches: [main]
            tags: ['v*.*.*']
        permissions:
          contents: write
          packages: write
          id-token: write
          attestations: write
        secrets:
          docker-password: DOCKER_PASSWORD
        params:
          docker-image: "blinklabs/${image}"
          ghcr-image: "blinklabs-io/${image}"
          description: "${description}"

