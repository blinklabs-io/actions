repositories:
  - name: blinklabs-io/test-reusable-ghactions
    settings:
      delete_branch_on_merge: true
    # Direct per-user collaborator access — currently none.
    # Note: org-level team access (Core/write, Ops/admin, PMs/maintain,
    # Docs/write) is managed at the organization level and is intentionally
    # out of scope for this governance engine.
    collaborators: []
    branch_protection:
      - branch: main
        required_status_checks: []
        require_up_to_date: false
        bypass_pull_request: true  # Allows the GitHub App to push workflow files directly
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        enforce_admins: false
        require_linear_history: false
        required_conversation_resolution: false
        allow_force_pushes: false
        allow_deletions: false
        lock_branch: false
    workflows:
      - destination_file: issue-close-test.yaml
        workflow_name: "Issue Close Test"
        reusable_workflow: "blinklabs-io/actions/.github/workflows/reuseable-test-issue-on-close.yml@main"
        params:
          issue_number: "${{ github.event.issue.number }}"
          issue_title: "${{ github.event.issue.title }}"
      - destination_file: set-project-closed-date.yaml
        workflow_name: "Set Project Closed Date"
        reusable_workflow: "blinklabs-io/actions/.github/workflows/reuseable-set-project-closed-date.yml@main"
        params:
          project_url: "https://github.com/orgs/blinklabs-io/projects/11"
          closed_date_field: "Closed Date"
          closed_at: "${{ github.event.issue.closed_at }}"
