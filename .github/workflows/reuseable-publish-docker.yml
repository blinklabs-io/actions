name: Reuseable Publish Docker

on:
  workflow_call:
    inputs:
      docker-image:
        description: Docker Hub image name (e.g. blinklabs/go).
        required: true
        type: string
      ghcr-image:
        description: GHCR image name without registry prefix (e.g. blinklabs-io/go).
        required: true
        type: string
      description:
        description: Short description for the Docker Hub repository.
        required: false
        type: string
        default: ""
      readme-filepath:
        description: Path to the README file used for Docker Hub description update.
        required: false
        type: string
        default: "./README.md"
    secrets:
      docker-password:
        description: Docker Hub access token.
        required: true

concurrency: ${{ github.ref }}-${{ inputs.docker-image }}

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 https://github.com/actions/checkout/releases/tag/v6.0.3
        with:
          fetch-depth: '0'
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4 https://github.com/docker/setup-qemu-action/releases/tag/v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4 https://github.com/docker/setup-buildx-action/releases/tag/v4
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4 https://github.com/docker/login-action/releases/tag/v4
        with:
          username: blinklabs
          password: ${{ secrets.docker-password }}
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4 https://github.com/docker/login-action/releases/tag/v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6 https://github.com/docker/metadata-action/releases/tag/v6
        with:
          images: |
            ${{ inputs.docker-image }}
            ghcr.io/${{ inputs.ghcr-image }}
          tags: |
            type=match,pattern=v(.*),group=1
            type=ref,event=branch
      - name: Build and push images
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7 https://github.com/docker/build-push-action/releases/tag/v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Update Docker Hub description
        if: inputs.description != ''
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5 https://github.com/peter-evans/dockerhub-description/releases/tag/v5
        with:
          username: blinklabs
          password: ${{ secrets.docker-password }}
          repository: ${{ inputs.docker-image }}
          readme-filepath: ${{ inputs.readme-filepath }}
          short-description: ${{ inputs.description }}

  github-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    needs: [build-and-push-image]
    steps:
      - run: "echo \"RELEASE_TAG=${GITHUB_REF#refs/tags/}\" >> $GITHUB_ENV"
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9 https://github.com/actions/github-script/releases/tag/v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              try {
                await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag: process.env.RELEASE_TAG,
                });
                core.info(`Release ${process.env.RELEASE_TAG} already exists; skipping create.`);
                return;
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
              await github.rest.repos.createRelease({
                draft: false,
                generate_release_notes: true,
                name: process.env.RELEASE_TAG,
                owner: context.repo.owner,
                prerelease: false,
                repo: context.repo.repo,
                tag_name: process.env.RELEASE_TAG,
              });
            } catch (error) {
              core.setFailed(error.message);
            }
