name: Reusable Publish

on:
  workflow_call:
    inputs:
      binary-name:
        description: Name of the compiled binary (e.g. tx-submit-api).
        required: true
        type: string
      docker-image:
        description: Docker Hub image name (e.g. blinklabs/tx-submit-api). Leave empty to skip Docker Hub and publish to GHCR only.
        required: false
        type: string
        default: ""
      description:
        description: Short description for the Docker Hub repository.
        required: false
        type: string
        default: ""
      go-version:
        description: Go toolchain version to use for building binaries.
        required: false
        type: string
        default: "1.25.x"
      binary-os-matrix:
        description: JSON array of OS targets for binary builds (e.g. '["linux","darwin"]').
        required: false
        type: string
        default: '["linux","darwin","freebsd","windows"]'
      binary-compress:
        description: When true, the release binary is packed into a .tar.gz archive before uploading.
        required: false
        type: boolean
        default: false
      build-args:
        description: Build ARG values to pass to Docker build (multi-line KEY=VALUE pairs).
        required: false
        type: string
        default: ""
    secrets:
      docker-password:
        description: Docker Hub access token. Required when docker-image is set.
        required: false

concurrency: ${{ github.ref }}

jobs:
  create-draft-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      RELEASE_ID: ${{ steps.create-release.outputs.result }}
    steps:
      - run: |
          echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9 https://github.com/actions/github-script/releases/tag/v9
        id: create-release
        if: startsWith(github.ref, 'refs/tags/')
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            try {
              const response = await github.rest.repos.createRelease({
                draft: true,
                generate_release_notes: true,
                name: process.env.RELEASE_TAG,
                owner: context.repo.owner,
                prerelease: false,
                repo: context.repo.repo,
                tag_name: process.env.RELEASE_TAG,
              });
              return response.data.id;
            } catch (error) {
              core.setFailed(error.message);
            }

  build-binaries:
    strategy:
      matrix:
        os: ${{ fromJson(inputs.binary-os-matrix) }}
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    needs: [create-draft-release]
    permissions:
      actions: write
      attestations: write
      checks: write
      contents: write
      id-token: write
      packages: write
      statuses: write
    steps:
      - run: |
          echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 https://github.com/actions/checkout/releases/tag/v6.0.3
        with:
          fetch-depth: '0'
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6 https://github.com/actions/setup-go/releases/tag/v6
        with:
          go-version: ${{ inputs.go-version }}
      - name: Build binary
        env:
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_ARCH: ${{ matrix.arch }}
        run: GOOS="$MATRIX_OS" GOARCH="$MATRIX_ARCH" make build
      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          BINARY_NAME: ${{ inputs.binary-name }}
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_ARCH: ${{ matrix.arch }}
          BINARY_COMPRESS: ${{ inputs.binary-compress }}
          RELEASE_ID: ${{ needs.create-draft-release.outputs.RELEASE_ID }}
        run: |
          _binary_src="$BINARY_NAME"
          _base="${BINARY_NAME}-${RELEASE_TAG}-${MATRIX_OS}-${MATRIX_ARCH}"
          if [[ "$MATRIX_OS" == "windows" ]]; then
            _binary_src="${_binary_src}.exe"
            _base="${_base}.exe"
          fi
          if [[ "$BINARY_COMPRESS" == "true" ]]; then
            _filename="${_base}.tar.gz"
            tar czf "${_filename}" "${_binary_src}"
          else
            _filename="${_base}"
            cp "${_binary_src}" "${_filename}"
          fi
          echo "RELEASE_ASSET_FILENAME=${_filename}" >> "$GITHUB_ENV"
          curl --fail \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"${_filename}" \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${_filename}"
      - name: Attest binary
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0 https://github.com/actions/attest/releases/tag/v4.1.0
        with:
          subject-path: '${{ env.RELEASE_ASSET_FILENAME || inputs.binary-name }}'

  # Native multi-arch image builds: separate amd64 / arm64 jobs on native
  # runners (no QEMU emulation), followed by a manifest-merge job. Each arch job
  # pushes an arch-suffixed image and attests it; the manifest job stitches them
  # into the final multi-arch tags. Docker Hub steps are skipped when docker-image
  # is empty (GHCR-only repositories).
  build-image-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
        with:
          fetch-depth: '0'
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0 https://github.com/docker/setup-buildx-action/releases/tag/v4.1.0
      - name: Login to Docker Hub
        if: inputs.docker-image != ''
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          username: blinklabs
          password: ${{ secrets.docker-password }}
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 https://github.com/actions/cache/releases/tag/v5.0.5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-${{ runner.arch }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-buildx-
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0 https://github.com/docker/metadata-action/releases/tag/v6.1.0
        with:
          images: |
            ${{ inputs.docker-image }}
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
            suffix=-amd64
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # branch
            type=ref,event=branch
            # semver
            type=semver,pattern={{version}}
      - name: push
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0 https://github.com/docker/build-push-action/releases/tag/v7.2.0
        with:
          context: .
          push: true
          build-args: ${{ inputs.build-args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
      - name: cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
      - name: pull-and-push
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for t in $TAGS; do
            docker pull "$t" && docker push "$t"
          done
      - name: Attest Docker Hub image (amd64)
        if: inputs.docker-image != ''
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2 https://github.com/actions/attest-build-provenance/releases/tag/v2
        with:
          subject-name: index.docker.io/${{ inputs.docker-image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Attest GHCR image (amd64)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2 https://github.com/actions/attest-build-provenance/releases/tag/v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  build-image-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
        with:
          fetch-depth: '0'
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0 https://github.com/docker/setup-buildx-action/releases/tag/v4.1.0
      - name: Login to Docker Hub
        if: inputs.docker-image != ''
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          username: blinklabs
          password: ${{ secrets.docker-password }}
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 https://github.com/actions/cache/releases/tag/v5.0.5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-${{ runner.arch }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-buildx-
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0 https://github.com/docker/metadata-action/releases/tag/v6.1.0
        with:
          images: |
            ${{ inputs.docker-image }}
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
            suffix=-arm64v8
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # branch
            type=ref,event=branch
            # semver
            type=semver,pattern={{version}}
      - name: push
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0 https://github.com/docker/build-push-action/releases/tag/v7.2.0
        with:
          context: .
          push: true
          build-args: ${{ inputs.build-args }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
      - name: cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
      - name: pull-and-push
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for t in $TAGS; do
            docker pull "$t" && docker push "$t"
          done
      - name: Attest Docker Hub image (arm64)
        if: inputs.docker-image != ''
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2 https://github.com/actions/attest-build-provenance/releases/tag/v2
        with:
          subject-name: index.docker.io/${{ inputs.docker-image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Attest GHCR image (arm64)
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2 https://github.com/actions/attest-build-provenance/releases/tag/v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  image-manifest:
    runs-on: ubuntu-latest
    needs: [build-image-amd64, build-image-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
        with:
          fetch-depth: '0'
          persist-credentials: false
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0 https://github.com/docker/setup-buildx-action/releases/tag/v4.1.0
      - name: Login to Docker Hub
        if: inputs.docker-image != ''
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          username: blinklabs
          password: ${{ secrets.docker-password }}
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR: all base tags (branch + version), no :latest.
      - id: meta-ghcr
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0 https://github.com/docker/metadata-action/releases/tag/v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=match,pattern=v(.*)-(.*),group=1
            type=ref,event=branch
            type=semver,pattern={{version}}
      # GHCR: version tags only, used to also point :latest on tag builds.
      - id: meta-ghcr-tag
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0 https://github.com/docker/metadata-action/releases/tag/v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            type=match,pattern=v(.*)-(.*),group=1
            type=semver,pattern={{version}}

      # Docker Hub metadata (only evaluated when docker-image is set).
      - id: meta-dockerhub
        if: inputs.docker-image != ''
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0 https://github.com/docker/metadata-action/releases/tag/v6.1.0
        with:
          images: ${{ inputs.docker-image }}
          flavor: |
            latest=false
          tags: |
            type=match,pattern=v(.*)-(.*),group=1
            type=ref,event=branch
            type=semver,pattern={{version}}
      - id: meta-dockerhub-tag
        if: inputs.docker-image != ''
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0 https://github.com/docker/metadata-action/releases/tag/v6.1.0
        with:
          images: ${{ inputs.docker-image }}
          flavor: |
            latest=false
          tags: |
            type=match,pattern=v(.*)-(.*),group=1
            type=semver,pattern={{version}}

      # Create and push manifests to GHCR. `docker buildx imagetools create`
      # creates and pushes atomically, avoiding stale-manifest issues.
      - name: manifest-ghcr
        env:
          GHCR_TAGS: ${{ steps.meta-ghcr.outputs.tags }}
        run: |
          for t in $GHCR_TAGS; do
            docker buildx imagetools create -t "${t}" "${t}-amd64" "${t}-arm64v8"
          done
      - name: manifest-ghcr-latest
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GHCR_IMAGE: ghcr.io/${{ github.repository }}
          GHCR_TAG_TAGS: ${{ steps.meta-ghcr-tag.outputs.tags }}
        run: |
          for t in $GHCR_TAG_TAGS; do
            docker buildx imagetools create \
              -t "${t}" \
              -t "${GHCR_IMAGE}:latest" \
              "${t}-amd64" "${t}-arm64v8"
          done

      # Create and push manifests to Docker Hub (skipped when docker-image empty).
      - name: manifest-dockerhub
        if: inputs.docker-image != ''
        env:
          DH_TAGS: ${{ steps.meta-dockerhub.outputs.tags }}
        run: |
          for t in $DH_TAGS; do
            docker buildx imagetools create -t "${t}" "${t}-amd64" "${t}-arm64v8"
          done
      - name: manifest-dockerhub-latest
        if: inputs.docker-image != '' && startsWith(github.ref, 'refs/tags/')
        env:
          DOCKER_IMAGE: ${{ inputs.docker-image }}
          DH_TAG_TAGS: ${{ steps.meta-dockerhub-tag.outputs.tags }}
        run: |
          for t in $DH_TAG_TAGS; do
            docker buildx imagetools create \
              -t "${t}" \
              -t "${DOCKER_IMAGE}:latest" \
              "${t}-amd64" "${t}-arm64v8"
          done

      - name: Update Docker Hub description
        if: inputs.docker-image != '' && inputs.description != ''
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5 https://github.com/peter-evans/dockerhub-description/releases/tag/v5
        with:
          username: blinklabs
          password: ${{ secrets.docker-password }}
          repository: ${{ inputs.docker-image }}
          readme-filepath: ./README.md
          short-description: ${{ inputs.description }}

  finalize-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [create-draft-release, build-binaries, image-manifest]
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9 https://github.com/actions/github-script/releases/tag/v9
        if: startsWith(github.ref, 'refs/tags/')
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: ${{ needs.create-draft-release.outputs.RELEASE_ID }},
                draft: false,
              });
            } catch (error) {
              core.setFailed(error.message);
            }
