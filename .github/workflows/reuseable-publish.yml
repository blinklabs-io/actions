name: Reusable Publish

on:
  workflow_call:
    inputs:
      binary-name:
        description: Name of the compiled binary (e.g. tx-submit-api).
        required: true
        type: string
      docker-image:
        description: Docker Hub image name (e.g. blinklabs/tx-submit-api). Leave empty to skip Docker Hub and publish to GHCR only.
        required: false
        type: string
        default: ""
      description:
        description: Short description for the Docker Hub repository.
        required: false
        type: string
        default: ""
      go-version:
        description: Go toolchain version to use for building binaries.
        required: false
        type: string
        default: "1.25.x"
      binary-os-matrix:
        description: JSON array of OS targets for binary builds (e.g. '["linux","darwin"]').
        required: false
        type: string
        default: '["linux","darwin","freebsd","windows"]'
      binary-compress:
        description: When true, the release binary is packed into a .tar.gz archive before uploading.
        required: false
        type: boolean
        default: false
      build-args:
        description: Build ARG values to pass to Docker build (multi-line KEY=VALUE pairs).
        required: false
        type: string
        default: ""
    secrets:
      docker-password:
        description: Docker Hub access token. Required when docker-image is set.
        required: false

concurrency: ${{ github.ref }}

jobs:
  create-draft-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      RELEASE_ID: ${{ steps.create-release.outputs.result }}
    steps:
      - run: |
          echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9 https://github.com/actions/github-script/releases/tag/v9
        id: create-release
        if: startsWith(github.ref, 'refs/tags/')
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            try {
              const response = await github.rest.repos.createRelease({
                draft: true,
                generate_release_notes: true,
                name: process.env.RELEASE_TAG,
                owner: context.repo.owner,
                prerelease: false,
                repo: context.repo.repo,
                tag_name: process.env.RELEASE_TAG,
              });
              return response.data.id;
            } catch (error) {
              core.setFailed(error.message);
            }

  build-binaries:
    strategy:
      matrix:
        os: ${{ fromJson(inputs.binary-os-matrix) }}
        arch: [amd64, arm64]
    runs-on: ubuntu-latest
    needs: [create-draft-release]
    permissions:
      actions: write
      attestations: write
      checks: write
      contents: write
      id-token: write
      packages: write
      statuses: write
    steps:
      - run: |
          echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 https://github.com/actions/checkout/releases/tag/v6.0.3
        with:
          fetch-depth: '0'
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6 https://github.com/actions/setup-go/releases/tag/v6
        with:
          go-version: ${{ inputs.go-version }}
      - name: Build binary
        env:
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_ARCH: ${{ matrix.arch }}
        run: GOOS="$MATRIX_OS" GOARCH="$MATRIX_ARCH" make build
      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          BINARY_NAME: ${{ inputs.binary-name }}
          MATRIX_OS: ${{ matrix.os }}
          MATRIX_ARCH: ${{ matrix.arch }}
          BINARY_COMPRESS: ${{ inputs.binary-compress }}
          RELEASE_ID: ${{ needs.create-draft-release.outputs.RELEASE_ID }}
        run: |
          _binary_src="$BINARY_NAME"
          _base="${BINARY_NAME}-${RELEASE_TAG}-${MATRIX_OS}-${MATRIX_ARCH}"
          if [[ "$MATRIX_OS" == "windows" ]]; then
            _binary_src="${_binary_src}.exe"
            _base="${_base}.exe"
          fi
          if [[ "$BINARY_COMPRESS" == "true" ]]; then
            _filename="${_base}.tar.gz"
            tar czf "${_filename}" "${_binary_src}"
          else
            _filename="${_base}"
            cp "${_binary_src}" "${_filename}"
          fi
          echo "RELEASE_ASSET_FILENAME=${_filename}" >> "$GITHUB_ENV"
          curl --fail \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"${_filename}" \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${_filename}"
      - name: Attest binary
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0 https://github.com/actions/attest/releases/tag/v4.1.0
        with:
          subject-path: '${{ env.RELEASE_ASSET_FILENAME || inputs.binary-name }}'

  build-images:
    runs-on: ubuntu-latest
    needs: [create-draft-release]
    permissions:
      actions: write
      attestations: write
      checks: write
      contents: write
      id-token: write
      packages: write
      statuses: write
    steps:
      - run: |
          echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 https://github.com/actions/checkout/releases/tag/v6.0.3
        with:
          fetch-depth: '0'
          persist-credentials: false
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4 https://github.com/docker/setup-qemu-action/releases/tag/v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4 https://github.com/docker/setup-buildx-action/releases/tag/v4
      - name: Login to Docker Hub
        if: inputs.docker-image != ''
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4 https://github.com/docker/login-action/releases/tag/v4
        with:
          username: blinklabs
          password: ${{ secrets.docker-password }}
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4 https://github.com/docker/login-action/releases/tag/v4
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6 https://github.com/docker/metadata-action/releases/tag/v6
        with:
          images: |
            ${{ inputs.docker-image != '' && inputs.docker-image || '' }}
            ghcr.io/${{ github.repository }}
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # branch
            type=ref,event=branch
            # semver
            type=semver,pattern={{version}}
      - name: Build images
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7 https://github.com/docker/build-push-action/releases/tag/v7
        id: push
        with:
          outputs: "type=registry,push=true"
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
      - name: Attest Docker Hub image
        if: inputs.docker-image != ''
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0 https://github.com/actions/attest/releases/tag/v4.1.0
        with:
          subject-name: index.docker.io/${{ inputs.docker-image }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Attest GHCR image
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0 https://github.com/actions/attest/releases/tag/v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Docker Hub Description
        if: inputs.docker-image != ''
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5 https://github.com/peter-evans/dockerhub-description/releases/tag/v5
        with:
          username: blinklabs
          password: ${{ secrets.docker-password }}
          repository: ${{ inputs.docker-image }}
          readme-filepath: ./README.md
          short-description: ${{ inputs.description }}

  finalize-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [create-draft-release, build-binaries, build-images]
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9 https://github.com/actions/github-script/releases/tag/v9
        if: startsWith(github.ref, 'refs/tags/')
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: ${{ needs.create-draft-release.outputs.RELEASE_ID }},
                draft: false,
              });
            } catch (error) {
              core.setFailed(error.message);
            }
