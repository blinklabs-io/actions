name: Reusable nilaway

on:
  workflow_call:
    inputs:
      include-pkgs:
        description: Package prefix passed to -include-pkgs (e.g. github.com/blinklabs-io/tx-submit-api).
        required: true
        type: string
      go-version:
        description: Go toolchain version to use.
        required: false
        type: string
        default: "1.25.x"

permissions:
  contents: read

jobs:
  nilaway:
    name: nilaway
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 https://github.com/actions/checkout/releases/tag/v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0 https://github.com/actions/setup-go/releases/tag/v6.4.0
        with:
          go-version: ${{ inputs.go-version }}
      - name: install nilaway
        run: go install go.uber.org/nilaway/cmd/nilaway@ad240b12fb4c370017eb413f0388c71f3be8722c
      - name: run nilaway
        env:
          INCLUDE_PKGS: ${{ inputs.include-pkgs }}
        run: nilaway -include-pkgs "$INCLUDE_PKGS" ./...
