name: Reusable Go Test

on:
  workflow_call:
    inputs:
      go-versions:
        description: JSON array of Go versions to test against.
        required: false
        type: string
        default: '["1.25.x","1.26.x"]'
      test-flags:
        description: Extra flags to pass to `go test` (e.g. "-race").
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  go-test:
    name: go-test
    strategy:
      matrix:
        go-version: ${{ fromJson(inputs.go-versions) }}
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 https://github.com/actions/checkout/releases/tag/v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6 https://github.com/actions/setup-go/releases/tag/v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: go-test
        run: go test ${{ inputs.test-flags }} ./...
