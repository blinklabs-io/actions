name: Central Governance Sync Engine

on:
  push:
    branches: [main]
    paths:
      - 'repos-config.yaml'
  workflow_dispatch:      # Trigger manually to run the sync

jobs:
  orchestrate-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Controller Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Authenticate via GitHub App
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.GOVERNANCE_APP_ID }}
          private-key: ${{ secrets.GOVERNANCE_APP_PRIVATE_KEY }}

      - name: Set up Go runtime
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'

      - name: Resolve Dependencies
        run: go mod tidy

      - name: Run Engine Execution Loop
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: go run ./app
