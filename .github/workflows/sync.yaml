name: Central Governance Sync Engine

on:
  push:
    branches: [main]
    paths:
      - 'repos-config.yaml'
  workflow_dispatch:      # Trigger manually to run the sync
  schedule:
    # Periodic reconciliation. When auto-discovery is enabled this picks up
    # newly-created marker repositories without a repos-config.yaml change; it
    # also corrects any drift on the managed set. Reconciliation is idempotent
    # (writes only when rendered content differs), so this is safe when
    # discovery is disabled too.
    - cron: '0 6 * * *'

# Serialize reconciliation runs. The engine writes workflow files directly to
# each managed repository's default branch, so two concurrent runs (e.g. a
# scheduled run overlapping a push or manual dispatch) could race on the same
# files. Never cancel an in-flight run midway through reconciliation.
concurrency:
  group: governance-sync
  cancel-in-progress: false

jobs:
  orchestrate-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Controller Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go runtime
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'

      # Scope the token only to the repos listed in repos-config.yaml rather
      # than the whole org, reducing the blast radius if the token is leaked.
      # When auto-discovery is enabled the explicit list cannot be known ahead
      # of time, so the token is scoped org-wide (empty `repositories` input =
      # all repositories the installation can access).
      - name: Resolve target repositories from config
        id: target-repos
        run: |
          config_parser=$(mktemp "${TMPDIR:-/tmp}/repos-config-parser-XXXXXX.go")
          trap 'rm -f "$config_parser"' EXIT
          cat > "$config_parser" <<'EOF'
          package main

          import (
            "fmt"
            "os"
            "strings"

            "gopkg.in/yaml.v3"
          )

          type config struct {
            Discovery struct {
              Enabled      bool   `yaml:"enabled"`
              Organization string `yaml:"organization"`
            } `yaml:"discovery"`
            Repositories []struct {
              Name string `yaml:"name"`
            } `yaml:"repositories"`
          }

          func main() {
            raw, err := os.ReadFile("repos-config.yaml")
            if err != nil {
              fmt.Fprintf(os.Stderr, "failed to read repos-config.yaml: %v\n", err)
              os.Exit(1)
            }

            var cfg config
            if err := yaml.Unmarshal(raw, &cfg); err != nil {
              fmt.Fprintf(os.Stderr, "failed to parse repos-config.yaml: %v\n", err)
              os.Exit(1)
            }

            outPath := os.Getenv("GITHUB_OUTPUT")
            if outPath == "" {
              fmt.Fprintln(os.Stderr, "GITHUB_OUTPUT is not set")
              os.Exit(1)
            }
            out, err := os.OpenFile(outPath, os.O_APPEND|os.O_WRONLY, 0o644)
            if err != nil {
              fmt.Fprintf(os.Stderr, "failed to open GITHUB_OUTPUT: %v\n", err)
              os.Exit(1)
            }
            defer out.Close()

            // Discovery mode: emit an empty list so the App token is scoped to
            // the whole installation, and emit the discovery organization as
            // the token owner so listing markers and writing to discovered
            // repositories is authorized even when the discovery org differs
            // from this controller repository's owner.
            if cfg.Discovery.Enabled {
              org := strings.TrimSpace(cfg.Discovery.Organization)
              if org == "" {
                fmt.Fprintln(os.Stderr, "discovery.enabled is true but discovery.organization is empty")
                os.Exit(1)
              }
              fmt.Fprintf(out, "owner=%s\n", org)
              fmt.Fprint(out, "list<<REPOS_EOF\nREPOS_EOF\n")
              return
            }

            if len(cfg.Repositories) == 0 {
              fmt.Fprintln(os.Stderr, "repos-config.yaml must define at least one repository (or enable discovery)")
              os.Exit(1)
            }

            repos := make([]string, 0, len(cfg.Repositories))
            for i, repo := range cfg.Repositories {
              name := strings.TrimSpace(repo.Name)
              if name == "" {
                fmt.Fprintf(os.Stderr, "repos-config.yaml repository at index %d is missing name\n", i)
                os.Exit(1)
              }
              repos = append(repos, name)
            }

            fmt.Fprintf(out, "list<<REPOS_EOF\n%s\nREPOS_EOF\n", strings.Join(repos, "\n"))
          }
          EOF
          go run "$config_parser"

      - name: Authenticate via GitHub App
        id: generate-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.GOVERNANCE_APP_CLIENT_ID }}
          private-key: ${{ secrets.GOVERNANCE_APP_PRIVATE_KEY }}
          owner: ${{ steps.target-repos.outputs.owner || github.repository_owner }}
          repositories: ${{ steps.target-repos.outputs.list }}

      - name: Resolve Dependencies
        run: go mod tidy

      - name: Run Engine Execution Loop
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: go run ./app
