name: Reuseable Publish Docker (Multi-arch Native)

# Builds and publishes multi-arch Docker images using native runners.
# Uses separate build-amd64 / build-arm64 jobs followed by a manifest-merge job,
# matching the native-runner pattern used by repositories such as docker-cardano-cli.
# This is distinct from reuseable-publish-docker.yml which uses QEMU in a single job.

on:
  workflow_call:
    inputs:
      docker-image:
        description: Docker Hub image name (e.g. blinklabs/cardano-cli).
        required: true
        type: string
      ghcr-image:
        description: GHCR image name without registry prefix (e.g. blinklabs-io/cardano-cli).
        required: true
        type: string
      description:
        description: Short description for the Docker Hub repository.
        required: false
        type: string
        default: ""
      readme-filepath:
        description: Path to the README file used for the Docker Hub description update.
        required: false
        type: string
        default: "./README.md"
    secrets:
      docker-password:
        description: Docker Hub access token.
        required: true

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
        with:
          fetch-depth: '0'
          persist-credentials: false

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0 https://github.com/docker/setup-buildx-action/releases/tag/v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          username: blinklabs
          password: ${{ secrets.docker-password }}

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 https://github.com/actions/cache/releases/tag/v5.0.5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-${{ runner.arch }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-buildx-

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0 https://github.com/docker/metadata-action/releases/tag/v6.1.0
        with:
          images: |
            ${{ inputs.docker-image }}
            ghcr.io/${{ inputs.ghcr-image }}
          flavor: |
            latest=false
            suffix=-amd64
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # Full version, with revision
            type=match,pattern=v(.*),group=1
            # branch
            type=ref,event=branch
            # semver
            type=semver,pattern={{version}}

      - name: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0 https://github.com/docker/build-push-action/releases/tag/v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Rotate cache to avoid unbounded growth
      # https://github.com/docker/build-push-action/issues/252
      - name: cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # Re-pull and re-push to ensure manifests are correctly submitted
      # https://github.com/moby/buildkit/issues/1896
      - name: pull-and-push
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for t in $TAGS; do
            docker pull "$t" && docker push "$t"
          done

  build-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
        with:
          fetch-depth: '0'
          persist-credentials: false

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0 https://github.com/docker/setup-buildx-action/releases/tag/v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          username: blinklabs
          password: ${{ secrets.docker-password }}

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5 https://github.com/actions/cache/releases/tag/v5.0.5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-${{ runner.arch }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-buildx-

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0 https://github.com/docker/metadata-action/releases/tag/v6.1.0
        with:
          images: |
            ${{ inputs.docker-image }}
            ghcr.io/${{ inputs.ghcr-image }}
          flavor: |
            latest=false
            suffix=-arm64v8
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # Full version, with revision
            type=match,pattern=v(.*),group=1
            # branch
            type=ref,event=branch
            # semver
            type=semver,pattern={{version}}

      - name: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0 https://github.com/docker/build-push-action/releases/tag/v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: pull-and-push
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for t in $TAGS; do
            docker pull "$t" && docker push "$t"
          done

  multi-arch-manifest:
    runs-on: ubuntu-latest
    needs: [build-amd64, build-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
        with:
          fetch-depth: '0'
          persist-credentials: false

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0 https://github.com/docker/setup-buildx-action/releases/tag/v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          username: blinklabs
          password: ${{ secrets.docker-password }}

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta-dockerhub
        name: Metadata - Docker Hub
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0 https://github.com/docker/metadata-action/releases/tag/v6.1.0
        with:
          images: ${{ inputs.docker-image }}
          flavor: |
            latest=false
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # Full version, with revision
            type=match,pattern=v(.*),group=1
            # branch
            type=ref,event=branch
            # semver
            type=semver,pattern={{version}}

      - id: meta-dockerhub-tag
        name: Metadata - Docker Hub (Tags)
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0 https://github.com/docker/metadata-action/releases/tag/v6.1.0
        with:
          images: ${{ inputs.docker-image }}
          flavor: |
            latest=false
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # Plain semver tag (no revision suffix, e.g. v1.2.3)
            type=semver,pattern={{version}}

      - id: meta-ghcr
        name: Metadata - GHCR
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0 https://github.com/docker/metadata-action/releases/tag/v6.1.0
        with:
          images: ghcr.io/${{ inputs.ghcr-image }}
          flavor: |
            latest=false
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # Full version, with revision
            type=match,pattern=v(.*),group=1
            # branch
            type=ref,event=branch
            # semver
            type=semver,pattern={{version}}

      - id: meta-ghcr-tag
        name: Metadata - GHCR (Tags)
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0 https://github.com/docker/metadata-action/releases/tag/v6.1.0
        with:
          images: ghcr.io/${{ inputs.ghcr-image }}
          flavor: |
            latest=false
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # Plain semver tag (no revision suffix, e.g. v1.2.3)
            type=semver,pattern={{version}}

      # Create and push manifests to GHCR

      - name: manifest-ghcr
        env:
          GHCR_TAGS: ${{ steps.meta-ghcr.outputs.tags }}
        run: |
          for t in $GHCR_TAGS; do
            docker manifest create "${t}" --amend "${t}-amd64" --amend "${t}-arm64v8"
          done

      - name: manifest-ghcr-tags
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GHCR_IMAGE: ghcr.io/${{ inputs.ghcr-image }}
          GHCR_TAG_TAGS: ${{ steps.meta-ghcr-tag.outputs.tags }}
        run: |
          for t in $GHCR_TAG_TAGS; do
            docker manifest create "${t}" --amend "${t}-amd64" --amend "${t}-arm64v8"
            docker manifest create "${GHCR_IMAGE}:latest" --amend "${t}-amd64" --amend "${t}-arm64v8"
          done

      - name: push-ghcr
        env:
          GHCR_TAGS: ${{ steps.meta-ghcr.outputs.tags }}
        run: |
          for t in $GHCR_TAGS; do
            docker manifest push "${t}"
          done

      - name: push-ghcr-tags
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GHCR_IMAGE: ghcr.io/${{ inputs.ghcr-image }}
          GHCR_TAG_TAGS: ${{ steps.meta-ghcr-tag.outputs.tags }}
        run: |
          docker manifest push "${GHCR_IMAGE}:latest"
          for t in $GHCR_TAG_TAGS; do
            docker manifest push "${t}"
          done

      # Create and push manifests to Docker Hub

      - name: manifest-dockerhub
        env:
          DH_TAGS: ${{ steps.meta-dockerhub.outputs.tags }}
        run: |
          for t in $DH_TAGS; do
            docker manifest create "${t}" --amend "${t}-amd64" --amend "${t}-arm64v8"
          done

      - name: manifest-dockerhub-tags
        if: startsWith(github.ref, 'refs/tags/')
        env:
          DOCKER_IMAGE: ${{ inputs.docker-image }}
          DH_TAG_TAGS: ${{ steps.meta-dockerhub-tag.outputs.tags }}
        run: |
          for t in $DH_TAG_TAGS; do
            docker manifest create "${t}" --amend "${t}-amd64" --amend "${t}-arm64v8"
            docker manifest create "${DOCKER_IMAGE}:latest" --amend "${t}-amd64" --amend "${t}-arm64v8"
          done

      - name: push-dockerhub
        env:
          DH_TAGS: ${{ steps.meta-dockerhub.outputs.tags }}
        run: |
          for t in $DH_TAGS; do
            docker manifest push "${t}"
          done

      - name: push-dockerhub-tags
        if: startsWith(github.ref, 'refs/tags/')
        env:
          DOCKER_IMAGE: ${{ inputs.docker-image }}
          DH_TAG_TAGS: ${{ steps.meta-dockerhub-tag.outputs.tags }}
        run: |
          docker manifest push "${DOCKER_IMAGE}:latest"
          for t in $DH_TAG_TAGS; do
            docker manifest push "${t}"
          done

      - name: Update Docker Hub description
        if: inputs.description != ''
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5 https://github.com/peter-evans/dockerhub-description/releases/tag/v5
        with:
          username: blinklabs
          password: ${{ secrets.docker-password }}
          repository: ${{ inputs.docker-image }}
          readme-filepath: ${{ inputs.readme-filepath }}
          short-description: ${{ inputs.description }}

  github-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    needs: [multi-arch-manifest]
    steps:
      - run: "echo \"RELEASE_TAG=${GITHUB_REF#refs/tags/}\" >> \"$GITHUB_ENV\""
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9 https://github.com/actions/github-script/releases/tag/v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              try {
                await github.rest.repos.getReleaseByTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag: process.env.RELEASE_TAG,
                });
                core.info(`Release ${process.env.RELEASE_TAG} already exists; skipping create.`);
                return;
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }
              await github.rest.repos.createRelease({
                draft: false,
                generate_release_notes: true,
                name: process.env.RELEASE_TAG,
                owner: context.repo.owner,
                prerelease: false,
                repo: context.repo.repo,
                tag_name: process.env.RELEASE_TAG,
              });
            } catch (error) {
              core.setFailed(error.message);
            }
